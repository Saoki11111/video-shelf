name: Auto Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge after CI
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest

    steps:
      - name: Squash merge current PR head
        env:
          CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json headRefOid,isCrossRepository,isDraft,state)"
          current_head="$(printf '%s' "$pr_json" | jq -r '.headRefOid')"
          is_cross_repository="$(printf '%s' "$pr_json" | jq -r '.isCrossRepository')"
          is_draft="$(printf '%s' "$pr_json" | jq -r '.isDraft')"
          state="$(printf '%s' "$pr_json" | jq -r '.state')"

          if [ "$state" != "OPEN" ] || [ "$is_draft" = "true" ] || [ "$is_cross_repository" = "true" ]; then
            exit 0
          fi

          if [ "$current_head" != "$CI_HEAD_SHA" ]; then
            echo "A newer commit exists; waiting for its CI run."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --squash \
            --delete-branch
