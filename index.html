<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="旅の動画をまとめた個人用ビデオライブラリ">
    <title>旅の記憶 | Video Shelf</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="トップへ">
        <span class="brand-mark">▶</span>
        <span>Video Shelf</span>
      </a>
    </header>

    <main>
      <section id="hero-carousel" class="hero slide-0" aria-label="おすすめ動画" aria-roledescription="カルーセル">
        <img id="hero-thumbnail" class="hero-thumbnail" src="images/thumbnails/202603-hongkong.jpg" alt="">
        <button id="carousel-prev" class="carousel-arrow carousel-prev" type="button" aria-label="前の動画">←</button>
        <div class="hero-content">
          <p id="hero-eyebrow" class="eyebrow">NEW TRIP</p>
          <h1 id="hero-title">旅の続きを、再生しよう。</h1>
          <p id="hero-description">旅先で残した景色を、いつでも気軽に。</p>
          <div class="hero-actions">
            <a id="hero-watch" class="watch-button" href="video.html?id=202603-hongkong">▶ この動画を見る</a>
            <a class="sub-button" href="#library-title">すべて見る</a>
          </div>
        </div>
        <p id="hero-number" class="hero-number" aria-hidden="true">01</p>
        <button id="carousel-next" class="carousel-arrow carousel-next" type="button" aria-label="次の動画">→</button>
        <div id="carousel-dots" class="carousel-dots" aria-label="表示する動画を選ぶ"></div>
      </section>

      <section class="library" aria-labelledby="library-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">YOUR COLLECTION</p>
            <h2 id="library-title">旅を選ぶ</h2>
          </div>
          <label class="sort-control">
            <span>並び順</span>
            <select id="sort-select">
              <option value="newest">新着順</option>
              <option value="recommended">おすすめ順</option>
            </select>
          </label>
        </div>

        <div class="filter-row">
          <span class="filter-label">場所</span>
          <div id="tag-filters" class="tag-filters" aria-label="場所で絞り込む"></div>
        </div>
        <p id="result-count" class="result-count" aria-live="polite"></p>
        <div id="video-grid" class="video-grid"></div>
        <p id="empty-state" class="empty-state" hidden>該当する動画はありません。</p>
      </section>
    </main>

    <footer>Video Shelf · Personal Archive</footer>
  </body>
</html>
