<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="旅の動画をまとめた個人用ビデオライブラリ">
    <title>旅の記憶 | Video Log</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" type="module"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="トップへ">
        <span class="brand-mark">▶</span>
        <span>Video Log</span>
      </a>
      <nav class="site-nav" aria-label="ページ">
        <a href="index.html" aria-current="page">トップ</a>
        <a href="timeline.html">一覧</a>
      </nav>
    </header>

    <main>
      <section id="hero-carousel" class="hero slide-0" aria-label="ピックアップ動画" aria-roledescription="カルーセル" role="link" tabindex="0">
        <img id="hero-thumbnail" class="hero-thumbnail" src="images/thumbnails/202603-hongkong.jpg" alt="">
        <button id="carousel-prev" class="carousel-arrow carousel-prev" type="button" aria-label="前の動画">←</button>
        <div class="hero-content">
          <p id="hero-eyebrow" class="eyebrow">NEW TRIP</p>
          <h1 id="hero-title">旅の続きを、再生しよう。</h1>
          <p id="hero-description">旅先で残した景色を、いつでも気軽に。</p>
        </div>
        <p id="hero-number" class="hero-number" aria-hidden="true">01</p>
        <button id="carousel-next" class="carousel-arrow carousel-next" type="button" aria-label="次の動画">→</button>
        <div id="carousel-dots" class="carousel-dots" aria-label="表示する動画を選ぶ"></div>
      </section>

      <div class="hero-list-link">
        <a class="page-button page-button-primary" href="timeline.html">動画一覧を見る →</a>
      </div>

      <div class="top-sections">
        <section class="shelf" aria-labelledby="new-videos-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">JUST ADDED</p>
              <h2 id="new-videos-title">新着動画</h2>
            </div>
          </div>
          <div id="new-videos" class="video-grid shelf-grid"></div>
        </section>
      </div>
    </main>

    <footer>Video Log · Personal Archive</footer>
  </body>
</html>
