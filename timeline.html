<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="年代順の動画一覧">
    <title>一覧 | Video Log</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/timeline.js" type="module"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="トップへ">
        <span class="brand-mark">VL</span>
        <span>Video Log</span>
      </a>
      <nav class="site-nav" aria-label="ページ">
        <a href="index.html">トップ</a>
        <a href="timeline.html" aria-current="page">一覧</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-intro">
        <p class="eyebrow">TIMELINE</p>
        <h1>一覧</h1>
        <p id="timeline-summary">場所で絞って、一覧で追えるページです。</p>
      </section>

      <div class="filter-row timeline-filter-row">
        <span class="filter-label">場所</span>
        <div class="tag-carousel">
          <button id="tag-carousel-prev" class="tag-carousel-navigation" type="button" aria-label="前の場所を見る">‹</button>
          <div id="tag-filters" class="tag-filters" aria-label="場所で絞り込む"></div>
          <button id="tag-carousel-next" class="tag-carousel-navigation" type="button" aria-label="次の場所を見る">›</button>
        </div>
      </div>

      <div id="timeline" class="timeline"></div>
      <p id="timeline-empty" class="empty-state" hidden>動画データを読み込めませんでした。</p>
    </main>

    <footer>Video Log · Personal Archive</footer>
  </body>
</html>
