<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="動画詳細">
    <title>動画 | Video Log</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/video.js" type="module"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">▶</span>
        <span>Video Log</span>
      </a>
      <nav class="site-nav" aria-label="ページ">
        <a href="index.html">トップ</a>
        <a href="timeline.html">一覧</a>
      </nav>
    </header>

    <main class="detail-page">
      <a class="back-link" href="timeline.html">← 一覧へ</a>
      <div id="detail" hidden>
        <div id="player" class="player"></div>
        <div class="detail-layout">
          <article>
            <div id="detail-tags" class="card-tags"></div>
            <h1 id="detail-title"></h1>
            <p id="detail-date" class="detail-date"></p>
            <p id="detail-description" class="detail-description"></p>
            <div class="detail-actions">
              <a id="detail-download" class="download-button" href="#" target="_blank" rel="noopener">ダウンロード</a>
              <a class="sub-button page-button page-button-primary" href="index.html">トップへ戻る</a>
            </div>
          </article>
        </div>
      </div>
      <p id="error-state" class="empty-state" hidden>動画が見つかりません。</p>
    </main>

    <footer>Video Log · Personal Archive</footer>
  </body>
</html>
